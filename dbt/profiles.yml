madrid_pollution:
  target: local
  outputs:
    local:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'madrid_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'madrid_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'madrid_pollution') }}"
      schema: analytics
      threads: 4
